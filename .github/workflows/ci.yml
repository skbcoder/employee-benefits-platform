name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Java Backend ────────────────────────────────────────────────────
  java-build:
    name: Java Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: employee_benefits_platform
          POSTGRES_USER: benefits_app
          POSTGRES_PASSWORD: benefits_app
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U benefits_app -d employee_benefits_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: ./mvnw clean verify -B
        env:
          DB_PORT: 5433

  # ── Frontend ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Python Lint & Security ─────────────────────────────────────────
  python-lint:
    name: Python Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff bandit

      - name: Ruff lint
        run: ruff check services/ai-platform/ --select E,F,I --ignore E501,E402,E711,E712

      - name: Bandit security scan
        run: bandit -r services/ai-platform/ -x "*/tests/*,*/.venv/*,*/seed-data/*" -s B101,B104,B108,B110 -ll -q

  # ── Python Tests ──────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test orchestrator
        working-directory: services/ai-platform/orchestrator
        run: |
          pip install -r requirements.txt pytest pytest-cov pyyaml
          PYTHONPATH=. pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=30

      - name: Install and test governance
        working-directory: services/ai-platform/governance
        run: |
          pip install pydantic pydantic-settings httpx pyyaml pytest pytest-cov
          PYTHONPATH=. pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=20

      - name: Install and test evaluation
        working-directory: services/ai-platform/evaluation
        run: |
          pip install pydantic pydantic-settings httpx pyyaml pytest pytest-cov rich jinja2
          PYTHONPATH=. pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=15

  # ── Docker Build Verification ───────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: enrollment-service, context: ., file: services/enrollment-service/Dockerfile }
          - { name: processing-service, context: ., file: services/processing-service/Dockerfile }
          - { name: ai-gateway, context: services/ai-platform/ai-gateway }
          - { name: orchestrator, context: services/ai-platform/orchestrator }
          - { name: knowledge-service, context: services/ai-platform/knowledge-service }
          - { name: governance, context: services/ai-platform/governance }
          - { name: evaluation, context: services/ai-platform/evaluation }
          - { name: mcp-server, context: services/ai-platform/mcp-server }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service.name }}
        run: |
          DOCKERFILE="${{ matrix.service.file || format('{0}/Dockerfile', matrix.service.context) }}"
          if [ -f "$DOCKERFILE" ]; then
            docker build -t ${{ matrix.service.name }}:ci -f "$DOCKERFILE" ${{ matrix.service.context }}
          else
            echo "No Dockerfile found for ${{ matrix.service.name }} — skipping"
          fi

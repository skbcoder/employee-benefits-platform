services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: employee-benefits-postgres
    environment:
      POSTGRES_DB: employee_benefits_platform
      POSTGRES_USER: benefits_app
      POSTGRES_PASSWORD: benefits_app
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benefits_app -d employee_benefits_platform"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  processing-service:
    build:
      context: ..
      dockerfile: services/processing-service/Dockerfile
    container_name: employee-benefits-processing-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: employee_benefits_platform
      DB_USERNAME: benefits_app
      DB_PASSWORD: benefits_app
      ENROLLMENT_SERVICE_URL: http://enrollment-service:8080
    ports:
      - "${PROCESSING_SERVICE_PORT:-8081}:8081"

  enrollment-service:
    build:
      context: ..
      dockerfile: services/enrollment-service/Dockerfile
    container_name: employee-benefits-enrollment-service
    depends_on:
      postgres:
        condition: service_healthy
      processing-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: employee_benefits_platform
      DB_USERNAME: benefits_app
      DB_PASSWORD: benefits_app
      PUBLISHER_TRANSPORT: http
      PROCESSING_SERVICE_URL: http://processing-service:8081
    ports:
      - "${ENROLLMENT_SERVICE_PORT:-8080}:8080"

volumes:
  postgres_data:

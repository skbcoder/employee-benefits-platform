policies:
  - id: enrollment_submit_review
    description: "New enrollment submissions are logged for compliance"
    trigger:
      agent: enrollment
      action: submit_enrollment
    conditions: []
    effect: log
    priority: 1
    enabled: true

  - id: enrollment_bulk_review
    description: "Enrollments with 4+ selections require approval"
    trigger:
      agent: enrollment
      action: submit_enrollment
    conditions:
      - field: selection_count
        operator: count_gt
        value: 3
    effect: require_approval
    priority: 10
    enabled: true

  - id: enrollment_pii_redact
    description: "Redact PII from enrollment responses"
    trigger:
      agent: "*"
      action: respond
    conditions:
      - field: response
        operator: matches_pattern
        value: "\\d{3}-\\d{2}-\\d{4}"
    effect: redact
    priority: 20
    enabled: true
